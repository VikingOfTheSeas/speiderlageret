<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-store">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>Kart – 1. Haugerud</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/auth.js"></script>
  <style>
    /* ── KART PAGE ─────────────────────────────────────────── */
    .kart-page { max-width: 1200px; margin: 0 auto; padding: 20px; }

    .kart-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
    }
    .kart-header h2 { font-size: 18px; font-weight: 700; color: var(--primary); }

    .kart-search-wrap {
      display: flex; align-items: center; gap: 8px;
    }
    .kart-search {
      padding: 9px 12px; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(70,189,198,0.25); border-radius: var(--r);
      color: var(--text); font-size: 13px; font-family: inherit;
      width: 220px; transition: border-color .15s;
    }
    .kart-search::placeholder { color: #475569; }
    .kart-search:focus { outline: none; border-color: rgba(70,189,198,0.55); background: rgba(255,255,255,0.09); }

    /* ── ROOM CONTAINER ────────────────────────────────────── */
    .room-container {
      position: relative;
      background: #10253e;
      border: 2px solid rgba(70,189,198,0.2);
      border-radius: 16px;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      max-height: 75vh;
      margin: 0 auto;
      cursor: grab;
      user-select: none;
      touch-action: none;
    }
    .room-container:active { cursor: grabbing; }

    .room-inner {
      position: absolute;
      width: 100%; height: 100%;
      transform-origin: 0 0;
      transition: transform 0.1s ease-out;
    }

    /* Walls */
    .room-walls {
      position: absolute;
      inset: 4% 4% 4% 4%;
      border: 3px solid rgba(70,189,198,0.35);
      border-radius: 8px;
      background: rgba(70,189,198,0.03);
    }

    /* Wall block */
    .room-wall-block {
      position: absolute;
      background: rgba(100,116,139,0.55);
      border: 2px solid rgba(100,116,139,0.8);
      border-radius: 3px;
      z-index: 4;
      pointer-events: none;
    }
    body.admin-mode .room-wall-block { pointer-events: auto; }

    /* Drag cursors in admin mode for movable shapes */
    body.admin-mode .room-door,
    body.admin-mode .sofakrok,
    body.admin-mode .room-wall-block {
      cursor: grab;
    }
    body.admin-mode .room-door.dragging,
    body.admin-mode .sofakrok.dragging,
    body.admin-mode .room-wall-block.dragging {
      cursor: grabbing; opacity: 0.85;
    }

    /* Resize handle — visible only in admin mode */
    .shape-resize {
      display: none;
      position: absolute;
      bottom: -7px; right: -7px;
      width: 14px; height: 14px;
      background: rgba(70,189,198,0.9);
      border: 2px solid #0d2137;
      border-radius: 3px;
      cursor: nwse-resize;
      z-index: 7;
      touch-action: none;
    }
    body.admin-mode .shape-resize { display: block; }
    .shape-resize:hover { background: #fff; }
    /* Admin controls on each shelf */
    .shelf-admin {
      display: none;
      position: absolute;
      top: -2px; right: -2px;
      gap: 2px;
      z-index: 3;
    }
    body.admin-mode .shelf-admin { display: flex; }
    .shelf-admin-btn {
      width: 16px; height: 16px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 3px;
      color: #fff;
      font-size: 9px;
      cursor: pointer;
      padding: 0; margin: 0;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }
    .shelf-admin-btn:hover { background: rgba(0,0,0,0.85); }
    .shelf[data-orientation="v"] .shelf-admin {
      transform: rotate(-90deg);
      transform-origin: top right;
    }
    /* Admin bar button */
    .admin-kart-btn {
      background: rgba(70,189,198,0.15);
      border: 1px solid rgba(70,189,198,0.4);
      color: var(--primary);
      padding: 7px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .admin-kart-btn:hover { background: rgba(70,189,198,0.28); }
    .admin-kart-btn-done {
      background: rgba(34,197,94,0.18);
      border-color: rgba(34,197,94,0.5);
      color: rgb(74, 222, 128);
    }
    .admin-kart-btn-done:hover { background: rgba(34,197,94,0.32); }

    /* Toast confirmation */
    .kart-toast {
      position: fixed;
      top: 16px; left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(34,197,94,0.95);
      color: #0b1e36;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 13px; font-weight: 600;
      box-shadow: 0 6px 24px rgba(0,0,0,0.4);
      z-index: 3000;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .25s;
    }
    .kart-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Dotted floor */
    .room-walls::before {
      content: "";
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(70,189,198,0.08) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    /* Door */
    .room-door {
      position: absolute;
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 4px;
      font-family: "DM Mono", monospace;
      font-size: 13px; font-weight: 700; color: rgba(70,189,198,0.9);
      letter-spacing: 2px;
      border-top: 3px solid rgba(70,189,198,0.6);
      border-left: 3px solid rgba(70,189,198,0.6);
      border-right: 3px solid rgba(70,189,198,0.6);
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      background: rgba(70,189,198,0.07);
      z-index: 6;
    }
    .room-door::before {
      content: "";
      position: absolute; top: 6px; left: 6px;
      right: 6px; bottom: 0;
      border-top: 2px dashed rgba(70,189,198,0.25);
      border-radius: 4px 4px 0 0;
    }

    /* ── SHELF ─────────────────────────────────────────────── */
    .shelf {
      position: absolute;
      background: rgba(239,68,68,0.2);
      border: 2px solid rgba(239,68,68,0.5);
      border-radius: 4px;
      cursor: pointer;
      transition: background .2s, border-color .2s, box-shadow .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      /* All shelves same rectangle; vertical ones use rotate */
      width: 15%; height: 14.4%;
    }
    .shelf[data-orientation="v"] { transform: rotate(90deg); }
    /* Admin drag mode */
    body.admin-mode .shelf { cursor: grab; }
    body.admin-mode .shelf.dragging { cursor: grabbing; opacity: .85; z-index: 50; transition: none; }
    .admin-kart-bar {
      display: none; align-items: center; gap: 8px;
      margin-bottom: 10px; flex-wrap: wrap;
    }
    body.admin-mode .admin-kart-bar { display: flex; }
    .admin-kart-hint { font-size: 11px; color: var(--muted); }
    .shelf:hover {
      background: rgba(239,68,68,0.35);
      border-color: rgba(239,68,68,0.8);
      filter: brightness(1.15);
      z-index: 20;
    }
    .shelf[data-orientation="v"]:hover { transform: rotate(90deg); }
    .shelf.highlight {
      background: rgba(70,189,198,0.35);
      border-color: var(--primary);
      box-shadow: 0 0 16px rgba(70,189,198,0.4);
      animation: shelf-pulse 1.5s ease-in-out infinite;
    }
    @keyframes shelf-pulse {
      0%, 100% { box-shadow: 0 0 16px rgba(70,189,198,0.4); }
      50% { box-shadow: 0 0 28px rgba(70,189,198,0.6); }
    }

    .shelf[data-orientation="v"] .shelf-label { transform: rotate(-90deg); }
    .shelf-label {
      font-family: 'DM Mono', monospace;
      font-size: clamp(10px, 1.5vw, 16px);
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      pointer-events: none;
    }

    /* Sofakrok */
    .sofakrok {
      position: absolute;
      background: rgba(70,189,198,0.15);
      border: 2px solid rgba(70,189,198,0.4);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }
    .sofakrok-label {
      font-size: clamp(9px, 1.2vw, 13px);
      font-weight: 600;
      color: var(--primary);
      opacity: 0.8;
      pointer-events: none;
    }

    /* ── TOOLTIP ────────────────────────────────────────────── */
    .shelf-tooltip {
      display: none;
      position: fixed;
      z-index: 1000;
      background: #0d2137;
      border: 1px solid rgba(70,189,198,0.35);
      border-radius: 10px;
      padding: 12px 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      pointer-events: none;
      min-width: 160px;
      max-width: 280px;
    }
    .shelf-tooltip.visible { display: block; }
    .shelf-tooltip-name {
      font-family: 'DM Mono', monospace;
      font-size: 16px; font-weight: 700;
      color: var(--primary); margin-bottom: 6px;
    }
    .shelf-tooltip-count {
      font-size: 12px; color: var(--muted); margin-bottom: 4px;
    }
    .shelf-tooltip-items {
      font-size: 11px; color: var(--text);
      max-height: 100px; overflow-y: auto;
      line-height: 1.6;
    }

    /* ── SHELF DETAIL PANEL ────────────────────────────────── */
    .shelf-panel {
      display: none;
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-top: 16px;
      overflow: hidden;
    }
    .shelf-panel.open { display: block; }
    .shelf-panel-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .shelf-panel-title {
      font-family: 'DM Mono', monospace;
      font-size: 18px; font-weight: 700; color: var(--primary);
    }
    .shelf-panel-close {
      width: 28px; height: 28px;
      background: rgba(255,255,255,0.07); border: none; border-radius: 6px;
      color: var(--muted); cursor: pointer; font-size: 13px;
    }
    .shelf-panel-close:hover { background: rgba(255,255,255,0.12); color: var(--text); }
    .shelf-panel-body { padding: 16px 20px; }
    .shelf-panel-empty {
      text-align: center; padding: 30px; color: var(--muted); font-size: 13px;
    }
    .shelf-item-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }
    .shelf-item-card {
      display: flex; flex-direction: column;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      overflow: hidden;
      text-decoration: none; color: inherit;
      transition: all .15s;
    }
    .shelf-item-card:hover {
      background: rgba(70,189,198,0.07);
      border-color: rgba(70,189,198,0.25);
      transform: translateY(-1px);
    }
    .shelf-item-img {
      width: 100%; height: 110px; object-fit: cover;
      background: rgba(255,255,255,0.03);
    }
    .shelf-item-img-placeholder {
      width: 100%; height: 110px;
      background: rgba(255,255,255,0.03);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; opacity: 0.3;
    }
    .shelf-item-info {
      padding: 10px 12px; display: flex; flex-direction: column; gap: 5px;
    }
    .shelf-item-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .shelf-item-meta { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 4px; }
    .shelf-item-id { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--primary); }
    .shelf-item-hylle { font-size: 10px; color: var(--muted); }
    .shelf-item-kat { font-size: 10px; color: var(--muted); }

    /* ── ZOOM CONTROLS ─────────────────────────────────────── */
    .zoom-controls {
      position: absolute; top: 12px; right: 12px;
      display: flex; gap: 4px; z-index: 50;
    }
    .zoom-btn {
      width: 36px; height: 36px;
      background: rgba(10,22,40,0.9); border: 1px solid rgba(70,189,198,0.3);
      border-radius: 8px; color: var(--primary);
      font-size: 18px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .zoom-btn:hover { background: rgba(70,189,198,0.15); }

    /* ── LEGEND ─────────────────────────────────────────────── */
    .kart-legend {
      display: flex; gap: 16px; flex-wrap: wrap;
      margin-top: 12px; font-size: 11px; color: var(--muted);
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-swatch {
      width: 14px; height: 14px; border-radius: 3px;
    }

    /* ── MODAL ──────────────────────────────────────────────── */
    .kart-modal {
      display: none;
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,0.6);
      align-items: center; justify-content: center;
      padding: 20px;
    }
    .kart-modal.open { display: flex; }
    .kart-modal-box {
      background: #0d2137;
      border: 1px solid rgba(70,189,198,0.35);
      border-radius: 12px;
      padding: 20px 22px;
      max-width: 360px; width: 100%;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }
    .kart-modal-title {
      font-family: 'DM Mono', monospace;
      font-size: 15px; font-weight: 700;
      color: var(--primary); margin: 0 0 12px;
    }
    .kart-modal-msg {
      font-size: 13px; color: var(--text); margin: 0 0 14px; line-height: 1.45;
    }
    .kart-modal-input {
      width: 100%; box-sizing: border-box;
      padding: 10px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(70,189,198,0.3);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px; font-family: inherit;
      margin-bottom: 14px;
    }
    .kart-modal-input:focus { outline: none; border-color: var(--primary); }
    .kart-modal-actions {
      display: flex; gap: 8px; justify-content: flex-end;
    }
    .kart-modal-btn {
      padding: 8px 14px; border-radius: 7px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      border: 1px solid transparent;
    }
    .kart-modal-btn.cancel {
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      border-color: rgba(255,255,255,0.1);
    }
    .kart-modal-btn.confirm {
      background: var(--primary);
      color: #0b1e36;
    }
    .kart-modal-btn.danger {
      background: rgba(239,68,68,0.2);
      color: rgb(248, 113, 113);
      border-color: rgba(239,68,68,0.4);
    }
    .kart-modal-btn:hover { filter: brightness(1.1); }

    /* ── RESPONSIVE ─────────────────────────────────────────── */
    @media (max-width: 768px) {
      .kart-page { padding: 12px; }
      .room-container { aspect-ratio: 4 / 3; max-height: 50vh; }
      .kart-search { width: 160px; }
      .shelf-label { font-size: 10px; }
      .tabs { display: none; }
    }
  </style>
</head>

<main class="kart-page">
  <div class="kart-header">
    <h2>🗺️ Lagerkart</h2>
    <div class="kart-search-wrap">
      <input type="text" class="kart-search" id="kartSearch" placeholder="Søk gjenstand eller hylle..." oninput="sokKart(this.value)">
    </div>
  </div>

  <div class="admin-kart-bar">
    <button class="admin-kart-btn" onclick="leggTilHylle()">➕ Legg til hylle</button>
    <button class="admin-kart-btn admin-kart-btn-done" onclick="ferdigRedigere()">✓ Ferdig</button>
    <span class="admin-kart-hint">🔧 Dra for å flytte · Dobbeltklikk for å rotere · ✏️ endrer navn · 🗑️ sletter</span>
  </div>

  <div class="room-container" id="roomContainer">
    <div class="room-inner" id="roomInner">
      <!-- Walls -->
      <div class="room-walls"></div>

      <!-- Door (positioned/sized dynamically by initShapes) -->
      <div class="room-door" id="roomDoor">DØR</div>

      <!-- Sofakrok (right-middle, between N and B) -->
      <div class="sofakrok" id="roomSofakrok">
        <span class="sofakrok-label">Sofakrok</span>
      </div>

      <!-- Wall block klump between L and M -->
      <div class="room-wall-block" id="roomWall"></div>

      <!-- Shelves rendered dynamically by renderShelves() from localStorage/DEFAULT_SHELVES -->
    </div>

    <!-- Zoom controls -->
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="zoom(1)">+</button>
      <button class="zoom-btn" onclick="resetZoom()" style="font-size:12px;">&#8634;</button>
    </div>
  </div>

  <!-- Legend -->
  <div class="kart-legend">
    <div class="legend-item">
      <div class="legend-swatch" style="background:rgba(239,68,68,0.3);border:2px solid rgba(239,68,68,0.6);"></div>
      Hylle
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:rgba(70,189,198,0.3);border:2px solid rgba(70,189,198,0.6);"></div>
      Sofakrok
    </div>
  </div>

  <!-- Shelf tooltip (follows mouse) -->
  <div class="shelf-tooltip" id="shelfTooltip">
    <div class="shelf-tooltip-name" id="tooltipName"></div>
    <div class="shelf-tooltip-count" id="tooltipCount"></div>
    <div class="shelf-tooltip-items" id="tooltipItems"></div>
  </div>

  <!-- Shelf detail panel -->
  <div class="shelf-panel" id="shelfPanel">
    <div class="shelf-panel-header">
      <span class="shelf-panel-title" id="panelTitle">Hylle</span>
      <button class="shelf-panel-close" onclick="lukkPanel()">X</button>
    </div>
    <div class="shelf-panel-body" id="panelBody"></div>
  </div>
</main>

<!-- Toast confirmation -->
<div class="kart-toast" id="kartToast"></div>

<!-- Custom modal (replaces prompt/confirm) -->
<div class="kart-modal" id="kartModal" role="dialog" aria-modal="true">
  <div class="kart-modal-box">
    <h3 class="kart-modal-title" id="kartModalTitle"></h3>
    <p class="kart-modal-msg" id="kartModalMsg" style="display:none"></p>
    <input type="text" class="kart-modal-input" id="kartModalInput" style="display:none">
    <div class="kart-modal-actions">
      <button class="kart-modal-btn cancel" id="kartModalCancel">Avbryt</button>
      <button class="kart-modal-btn confirm" id="kartModalOk">OK</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin="anonymous"></script>
<script src="js/config.js"></script>
<script>
// ── DATA ──────────────────────────────────────────────────
let gjenstander = [];
let hylleData = {}; // { "A": [item, item, ...], "B": [...] }
let valgtHylle = null;

document.addEventListener("DOMContentLoaded", async () => {
  const { data, error } = await db.from("gjenstander").select("*");
  if (error) { console.error(error); return; }
  gjenstander = data || [];
  byggHylleData();
  oppdaterHylleTellere();

  // Highlight shelf from URL param
  const params = new URLSearchParams(location.search);
  const h = params.get("hylle");
  if (h) {
    highlightHylle(h.toUpperCase());
    velgHylle(h.toUpperCase());
  }

  // Realtime updates
  db.channel("kart-gjenstander")
    .on("postgres_changes", { event: "*", schema: "public", table: "gjenstander" },
      () => lastInnData())
    .subscribe();
});

async function lastInnData() {
  const { data } = await db.from("gjenstander").select("*");
  gjenstander = data || [];
  byggHylleData();
  oppdaterHylleTellere();
  if (valgtHylle) visPanel(valgtHylle);
}

function byggHylleData() {
  hylleData = {};
  gjenstander.forEach(g => {
    const h = extractHylle(g.hylleplassering);
    if (!h) return;
    if (!hylleData[h]) hylleData[h] = [];
    hylleData[h].push(g);
  });
}

function extractHylle(plassering) {
  if (!plassering) return null;
  // Match by longest shelf-id prefix (supports multi-char custom names)
  const up = plassering.toUpperCase();
  const ids = Array.from(document.querySelectorAll(".shelf"))
    .map(el => el.dataset.shelf)
    .sort((a, b) => b.length - a.length);
  for (const id of ids) {
    if (up.startsWith(id.toUpperCase())) return id;
  }
  // Fallback: legacy A-N letter prefix
  const m = plassering.match(/^([A-Z])/i);
  return m ? m[1].toUpperCase() : null;
}

function oppdaterHylleTellere() {
  document.querySelectorAll(".shelf").forEach(el => {
    const id = el.dataset.shelf;
    const name = el.dataset.name || id;
    const items = hylleData[id] || [];
    const label = el.querySelector(".shelf-label");
    label.textContent = name + (items.length ? " (" + items.length + ")" : "");
  });
}

// ── SHELF CLICK → PANEL ──────────────────────────────────
function velgHylle(id) {
  valgtHylle = id;
  // Highlight
  document.querySelectorAll(".shelf").forEach(el => el.classList.remove("highlight"));
  const el = document.querySelector('.shelf[data-shelf="' + CSS.escape(id) + '"]');
  if (el) el.classList.add("highlight");
  visPanel(id);
}

function visPanel(id) {
  const panel = document.getElementById("shelfPanel");
  const body = document.getElementById("panelBody");
  const items = hylleData[id] || [];
  const antall = items.length;
  const shelfEl = document.querySelector('.shelf[data-shelf="' + CSS.escape(id) + '"]');
  const name = (shelfEl && shelfEl.dataset.name) || id;
  document.getElementById("panelTitle").textContent = "Hylle " + name + (antall ? " · " + antall + " gjenstand" + (antall !== 1 ? "er" : "") : "");

  if (antall === 0) {
    body.innerHTML = '<div class="shelf-panel-empty">Ingen gjenstander på denne hyllen</div>';
  } else {
    const statusKlasse = s => ({ "Tilgjengelig":"status-tilgjengelig","Utlånt":"status-utlant","Til reparasjon":"status-reparasjon","Tapt":"status-tapt" }[s] || "status-tilgjengelig");
    const statusTekst  = s => ({ "Tilgjengelig":"Tilgjengelig","Utlånt":"Utlånt","Til reparasjon":"Reparasjon","Tapt":"Tapt" }[s] || s);
    body.innerHTML = '<div class="shelf-item-grid">' + items.map(g => {
      const img = g.bilde_url
        ? '<img class="shelf-item-img" src="' + escHtml(g.bilde_url) + '" alt="" loading="lazy" onerror="this.outerHTML=\'<div class=shelf-item-img-placeholder>📦</div>\'">'
        : '<div class="shelf-item-img-placeholder">📦</div>';
      return '<a href="item.html?id=' + encodeURIComponent(g.id) + '" class="shelf-item-card">' +
        img +
        '<div class="shelf-item-info">' +
          '<div class="shelf-item-name">' + escHtml(g.navn) + '</div>' +
          '<div class="shelf-item-meta">' +
            '<span class="shelf-item-id">' + escHtml(g.id) + '</span>' +
            '<span class="status-badge ' + statusKlasse(g.status) + '">' + statusTekst(g.status) + '</span>' +
          '</div>' +
          (g.kategori ? '<div class="shelf-item-kat">' + escHtml(g.kategori) + '</div>' : '') +
          '<div class="shelf-item-hylle">📍 ' + escHtml(g.hylleplassering || id) + '</div>' +
        '</div>' +
      '</a>';
    }).join("") + '</div>';
  }
  panel.classList.add("open");
  panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

function lukkPanel() {
  document.getElementById("shelfPanel").classList.remove("open");
  document.querySelectorAll(".shelf").forEach(el => el.classList.remove("highlight"));
  valgtHylle = null;
}

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s || "";
  return d.innerHTML;
}

// ── SEARCH ────────────────────────────────────────────────
function sokKart(q) {
  q = q.trim().toLowerCase();
  document.querySelectorAll(".shelf").forEach(el => el.classList.remove("highlight"));
  if (!q) { lukkPanel(); return; }

  // Match shelf letter
  const exactShelf = q.match(/^([a-n])$/i);
  if (exactShelf) {
    highlightHylle(exactShelf[1].toUpperCase());
    velgHylle(exactShelf[1].toUpperCase());
    return;
  }

  // Match item name → find shelf
  const found = new Set();
  gjenstander.forEach(g => {
    if ((g.navn || "").toLowerCase().includes(q) ||
        (g.id || "").toLowerCase().includes(q) ||
        (g.hylleplassering || "").toLowerCase().includes(q)) {
      const h = extractHylle(g.hylleplassering);
      if (h) found.add(h);
    }
  });
  found.forEach(h => highlightHylle(h));
  if (found.size === 1) velgHylle([...found][0]);
}

function highlightHylle(id) {
  const el = document.querySelector('.shelf[data-shelf="' + CSS.escape(id) + '"]');
  if (el) el.classList.add("highlight");
}

// ── ZOOM & PAN ────────────────────────────────────────────
let currentZoom = 1;
let panX = 0, panY = 0;
let isDragging = false;
let dragStartX, dragStartY;

function clampPan() {
  const cr = container.getBoundingClientRect();
  const inner = document.getElementById("roomInner");
  const maxX = Math.max(0, (inner.offsetWidth  * currentZoom - cr.width)  / 2);
  const maxY = Math.max(0, (inner.offsetHeight * currentZoom - cr.height) / 2);
  panX = Math.max(-maxX, Math.min(maxX, panX));
  panY = Math.max(-maxY, Math.min(maxY, panY));
}

function zoom(dir) {
  currentZoom = Math.max(1, Math.min(3, currentZoom + dir * 0.3));
  clampPan();
  applyTransform();
}

function resetZoom() {
  currentZoom = 1; panX = 0; panY = 0;
  applyTransform();
}

function applyTransform() {
  document.getElementById("roomInner").style.transform =
    'translate(' + panX + 'px, ' + panY + 'px) scale(' + currentZoom + ')';
}

const container = document.getElementById("roomContainer");
container.addEventListener("pointerdown", e => {
  if (e.target.closest(".shelf, .zoom-btn, .sofakrok, .room-door, .room-wall-block, .shape-resize")) return;
  isDragging = true;
  dragStartX = e.clientX - panX;
  dragStartY = e.clientY - panY;
  container.setPointerCapture(e.pointerId);
});
container.addEventListener("pointermove", e => {
  if (!isDragging) return;
  panX = e.clientX - dragStartX;
  panY = e.clientY - dragStartY;
  clampPan();
  document.getElementById("roomInner").style.transition = "none";
  applyTransform();
});
container.addEventListener("pointerup", () => {
  isDragging = false;
  document.getElementById("roomInner").style.transition = "transform 0.1s ease-out";
});
container.addEventListener("wheel", e => {
  e.preventDefault();
  zoom(e.deltaY < 0 ? 1 : -1);
}, { passive: false });

// ── ROOM SHAPES (door / sofakrok / wall) — move + resize ──
const LS_SHAPES = "kartShapes";
const DEFAULT_SHAPES = {
  door:     { top: "87.1%", left: "65%",   width: "11.25%", height: "12.9%" },
  sofakrok: { top: "19.7%", left: "61%",   width: "20.6%",  height: "33.6%" },
  wall:     { top: "8.5%",  left: "22%",   width: "4.7%",   height: "9.6%"  },
};

function lastShapes() {
  try {
    const v = JSON.parse(localStorage.getItem(LS_SHAPES));
    if (v && typeof v === "object") return v;
  } catch (_) {}
  return {};
}
function lagreShape(key, el) {
  const all = lastShapes();
  all[key] = {
    top: el.style.top,
    left: el.style.left,
    width: el.style.width,
    height: el.style.height,
  };
  localStorage.setItem(LS_SHAPES, JSON.stringify(all));
}

// Apply position/size for a shape from localStorage (or defaults). Safe
// to call repeatedly — re-used when cloud sync hydrates fresh data.
function applyShape(el, key) {
  if (!el) return;
  const s = lastShapes()[key] || DEFAULT_SHAPES[key];
  el.style.top = s.top;
  el.style.left = s.left;
  el.style.width = s.width;
  el.style.height = s.height;
  el.style.bottom = ""; // clear any CSS bottom:0 override
}

function initShape(el, key) {
  if (!el) return;
  applyShape(el, key);

  // Add resize handle
  const rs = document.createElement("div");
  rs.className = "shape-resize";
  rs.title = "Endre størrelse";
  el.appendChild(rs);

  // Resize
  rs.addEventListener("pointerdown", e => {
    if (!document.body.classList.contains("admin-mode")) return;
    e.stopPropagation();
    e.preventDefault();
    const room = document.getElementById("roomInner");
    const rr = room.getBoundingClientRect();
    const startPx = e.clientX, startPy = e.clientY;
    const startW = parseFloat(el.style.width) || 0;
    const startH = parseFloat(el.style.height) || 0;
    rs.setPointerCapture(e.pointerId);
    const onMove = ev => {
      const dw = (ev.clientX - startPx) / rr.width * 100;
      const dh = (ev.clientY - startPy) / rr.height * 100;
      el.style.width  = Math.max(1.5, startW + dw).toFixed(1) + "%";
      el.style.height = Math.max(1.5, startH + dh).toFixed(1) + "%";
    };
    const onUp = () => {
      rs.removeEventListener("pointermove", onMove);
      rs.removeEventListener("pointerup", onUp);
      lagreShape(key, el);
    };
    rs.addEventListener("pointermove", onMove);
    rs.addEventListener("pointerup", onUp);
  });

  // Drag
  el.addEventListener("pointerdown", e => {
    if (!document.body.classList.contains("admin-mode")) return;
    if (e.target.closest(".shape-resize")) return;
    e.stopPropagation();
    e.preventDefault();
    const room = document.getElementById("roomInner");
    const rr = room.getBoundingClientRect();
    const startPx = e.clientX, startPy = e.clientY;
    const startL = parseFloat(el.style.left) || 0;
    const startT = parseFloat(el.style.top) || 0;
    let didDrag = false;
    el.classList.add("dragging");
    el.setPointerCapture(e.pointerId);
    const onMove = ev => {
      const dx = (ev.clientX - startPx) / rr.width * 100;
      const dy = (ev.clientY - startPy) / rr.height * 100;
      if (Math.abs(dx) > 0.3 || Math.abs(dy) > 0.3) didDrag = true;
      el.style.left = Math.max(0, Math.min(100, startL + dx)).toFixed(1) + "%";
      el.style.top  = Math.max(0, Math.min(100, startT + dy)).toFixed(1) + "%";
    };
    const onUp = () => {
      el.removeEventListener("pointermove", onMove);
      el.removeEventListener("pointerup", onUp);
      el.classList.remove("dragging");
      if (didDrag) lagreShape(key, el);
    };
    el.addEventListener("pointermove", onMove);
    el.addEventListener("pointerup", onUp);
  });
}

initShape(document.getElementById("roomDoor"),     "door");
initShape(document.getElementById("roomSofakrok"), "sofakrok");
initShape(document.getElementById("roomWall"),     "wall");

// ── CLOUD SYNC (Supabase table kart_config, single row id=1) ──
// Source of truth is a single row on Supabase so every client sees the
// same map. localStorage is kept as a draft cache during admin edits;
// on "Ferdig" we push the local state to the cloud, and on page load
// we pull the cloud state down and overwrite localStorage.
const CLOUD_ROW_ID = 1;

async function lastKartConfigFraSky() {
  if (!window.db) return null;
  try {
    const { data, error } = await db
      .from("kart_config")
      .select("shelves,shapes")
      .eq("id", CLOUD_ROW_ID)
      .maybeSingle();
    if (error) { console.warn("kart cloud load:", error.message); return null; }
    return data || null;
  } catch (e) { console.warn("kart cloud load:", e); return null; }
}

async function lagreKartConfigTilSky() {
  if (!window.db) return false;
  let shelves = null, shapes = null;
  try { shelves = JSON.parse(localStorage.getItem(LS_SHELVES)); } catch (_) {}
  try { shapes  = JSON.parse(localStorage.getItem(LS_SHAPES));  } catch (_) {}
  try {
    const { error } = await db.from("kart_config").upsert({
      id: CLOUD_ROW_ID,
      shelves: shelves,
      shapes: shapes,
      updated_at: new Date().toISOString(),
    }, { onConflict: "id" });
    if (error) { console.warn("kart cloud save:", error.message); return false; }
    return true;
  } catch (e) { console.warn("kart cloud save:", e); return false; }
}

async function hydrateKartFromCloud() {
  // Don't clobber the user's in-progress admin edits.
  if (document.body.classList.contains("admin-mode")) return;
  const cloud = await lastKartConfigFraSky();
  if (!cloud) {
    // Cloud is empty — seed it from this client's local state (first-run migration).
    if (localStorage.getItem(LS_SHELVES) || localStorage.getItem(LS_SHAPES)) {
      await lagreKartConfigTilSky();
    }
    return;
  }
  if (Array.isArray(cloud.shelves) && cloud.shelves.length) {
    localStorage.setItem(LS_SHELVES, JSON.stringify(cloud.shelves));
  } else {
    localStorage.removeItem(LS_SHELVES);
  }
  if (cloud.shapes && typeof cloud.shapes === "object") {
    localStorage.setItem(LS_SHAPES, JSON.stringify(cloud.shapes));
  } else {
    localStorage.removeItem(LS_SHAPES);
  }
  // Re-apply shapes + re-render shelves with the fresh data.
  applyShape(document.getElementById("roomDoor"),     "door");
  applyShape(document.getElementById("roomSofakrok"), "sofakrok");
  applyShape(document.getElementById("roomWall"),     "wall");
  if (typeof renderShelves === "function") renderShelves();
}

// ── SHELF RENDERING (data-driven) ─────────────────────────
const LS_SHELVES = "kartShelves";

const DEFAULT_SHELVES = [
  { id:"L", name:"L", top:"4%",    left:"5%",    orientation:"h" },
  { id:"M", name:"M", top:"7%",    left:"30%",   orientation:"v" },
  { id:"N", name:"N", top:"4.6%",  left:"44.7%", orientation:"h" },
  { id:"K", name:"K", top:"36.5%", left:"2.6%",  orientation:"v" },
  { id:"J", name:"J", top:"56.9%", left:"2.6%",  orientation:"v" },
  { id:"I", name:"I", top:"77.4%", left:"2.5%",  orientation:"v" },
  { id:"H", name:"H", top:"47.2%", left:"23.5%", orientation:"h" },
  { id:"G", name:"G", top:"62.1%", left:"23.5%", orientation:"h" },
  { id:"F", name:"F", top:"54.4%", left:"49.8%", orientation:"v" },
  { id:"E", name:"E", top:"80.3%", left:"15.7%", orientation:"h" },
  { id:"D", name:"D", top:"80.4%", left:"32%",   orientation:"h" },
  { id:"C", name:"C", top:"80.5%", left:"48.5%", orientation:"h" },
  { id:"B", name:"B", top:"56.6%", left:"81.2%", orientation:"v" },
  { id:"A", name:"A", top:"77.5%", left:"81.1%", orientation:"v" },
];

function lastShelves() {
  try {
    const v = JSON.parse(localStorage.getItem(LS_SHELVES));
    if (Array.isArray(v) && v.length) return v;
  } catch (_) {}
  return null;
}

function lagreShelves() {
  const shelves = Array.from(document.querySelectorAll(".shelf")).map(el => ({
    id: el.dataset.shelf,
    name: el.dataset.name || el.dataset.shelf,
    top: el.style.top,
    left: el.style.left,
    orientation: el.dataset.orientation || "h",
  }));
  localStorage.setItem(LS_SHELVES, JSON.stringify(shelves));
}

function renderShelves() {
  const inner = document.getElementById("roomInner");
  // Remove existing shelves (keep walls/door/sofakrok/wall-block)
  inner.querySelectorAll(".shelf").forEach(el => el.remove());
  const list = lastShelves() || DEFAULT_SHELVES;
  list.forEach(s => {
    const el = document.createElement("div");
    el.className = "shelf";
    el.dataset.shelf = s.id;
    el.dataset.name = s.name || s.id;
    el.dataset.orientation = s.orientation || "h";
    el.style.top = s.top;
    el.style.left = s.left;

    const label = document.createElement("span");
    label.className = "shelf-label";
    label.textContent = s.name || s.id;
    el.appendChild(label);

    const admin = document.createElement("div");
    admin.className = "shelf-admin";
    const renameBtn = document.createElement("button");
    renameBtn.className = "shelf-admin-btn";
    renameBtn.title = "Endre navn";
    renameBtn.textContent = "✏️";
    renameBtn.addEventListener("pointerdown", e => e.stopPropagation());
    renameBtn.addEventListener("click", e => { e.stopPropagation(); renameShelf(el); });
    const delBtn = document.createElement("button");
    delBtn.className = "shelf-admin-btn";
    delBtn.title = "Slett hylle";
    delBtn.textContent = "🗑️";
    delBtn.addEventListener("pointerdown", e => e.stopPropagation());
    delBtn.addEventListener("click", e => { e.stopPropagation(); deleteShelf(el); });
    admin.appendChild(renameBtn);
    admin.appendChild(delBtn);
    el.appendChild(admin);

    attachShelfListeners(el);
    inner.appendChild(el);
  });
  oppdaterHylleTellere();
}

// ── MODAL (replaces prompt/confirm which are unreliable on mobile) ──
function kartModal(opts) {
  return new Promise(resolve => {
    const m = document.getElementById("kartModal");
    const title = document.getElementById("kartModalTitle");
    const msg = document.getElementById("kartModalMsg");
    const input = document.getElementById("kartModalInput");
    const ok = document.getElementById("kartModalOk");
    const cancel = document.getElementById("kartModalCancel");

    title.textContent = opts.title || "";
    if (opts.message) { msg.textContent = opts.message; msg.style.display = ""; } else { msg.style.display = "none"; }
    if (opts.input) {
      input.style.display = "";
      input.value = opts.defaultValue || "";
      input.placeholder = opts.placeholder || "";
    } else {
      input.style.display = "none";
      input.value = "";
    }
    ok.textContent = opts.okLabel || "OK";
    cancel.textContent = opts.cancelLabel || "Avbryt";
    ok.className = "kart-modal-btn " + (opts.danger ? "danger" : "confirm");

    const close = (val) => {
      m.classList.remove("open");
      ok.onclick = null; cancel.onclick = null; input.onkeydown = null; m.onclick = null;
      resolve(val);
    };
    ok.onclick = () => close(opts.input ? input.value : true);
    cancel.onclick = () => close(null);
    input.onkeydown = e => {
      if (e.key === "Enter") { e.preventDefault(); close(input.value); }
      else if (e.key === "Escape") { e.preventDefault(); close(null); }
    };
    m.onclick = e => { if (e.target === m) close(null); };

    m.classList.add("open");
    if (opts.input) setTimeout(() => { input.focus(); input.select(); }, 30);
  });
}

// ── ADMIN: add / rename / delete ──────────────────────────
async function leggTilHylle() {
  const raw = await kartModal({
    title: "Legg til hylle",
    message: "Gi hyllen et navn (f.eks. O eller TOOLS).",
    input: true,
    placeholder: "Navn",
  });
  if (raw == null) return;
  const name = String(raw).trim();
  if (!name) return;
  const id = name.toUpperCase();
  if (document.querySelector('.shelf[data-shelf="' + CSS.escape(id) + '"]')) {
    await kartModal({ title: "Finnes allerede", message: "En hylle med navnet '" + id + "' finnes allerede.", okLabel: "OK", cancelLabel: "" });
    return;
  }
  const current = Array.from(document.querySelectorAll(".shelf")).map(el => ({
    id: el.dataset.shelf,
    name: el.dataset.name || el.dataset.shelf,
    top: el.style.top,
    left: el.style.left,
    orientation: el.dataset.orientation || "h",
  }));
  current.push({ id, name: id, top: "50%", left: "50%", orientation: "h" });
  localStorage.setItem(LS_SHELVES, JSON.stringify(current));
  renderShelves();
}

async function renameShelf(el) {
  const oldId = el.dataset.shelf;
  const oldName = el.dataset.name || oldId;
  const raw = await kartModal({
    title: "Endre navn",
    message: "Nytt navn på hylle '" + oldName + "':",
    input: true,
    defaultValue: oldName,
  });
  if (raw == null) return;
  const newName = String(raw).trim();
  if (!newName || newName === oldName) return;
  const newId = newName.toUpperCase();
  if (newId !== oldId.toUpperCase() && document.querySelector('.shelf[data-shelf="' + CSS.escape(newId) + '"]')) {
    await kartModal({ title: "Finnes allerede", message: "En hylle med navnet '" + newId + "' finnes allerede." });
    return;
  }
  el.dataset.shelf = newId;
  el.dataset.name = newName;
  lagreShelves();
  oppdaterHylleTellere();
}

async function deleteShelf(el) {
  const name = el.dataset.name || el.dataset.shelf;
  const ok = await kartModal({
    title: "Slett hylle",
    message: "Slette hylle '" + name + "'? Gjenstander som refererer til denne hyllen blir ikke slettet, men vises ikke på kartet.",
    okLabel: "Slett",
    danger: true,
  });
  if (!ok) return;
  el.remove();
  lagreShelves();
}

// ── DRAG / CLICK / DBLCLICK / HOVER LISTENERS ─────────────
let _drag = { el: null, startPx: 0, startPy: 0, startElX: 0, startElY: 0, roomW: 0, roomH: 0, didDrag: false };

function attachShelfListeners(el) {
  // Click → velg hylle
  el.addEventListener("click", e => {
    if (_drag.didDrag) { e.stopImmediatePropagation(); _drag.didDrag = false; return; }
    if (e.target.closest(".shelf-admin")) return;
    velgHylle(el.dataset.shelf);
  }, true);

  // Drag in admin mode
  el.addEventListener("pointerdown", e => {
    if (!document.body.classList.contains("admin-mode")) return;
    if (e.target.closest(".shelf-admin")) return;
    e.stopPropagation();
    e.preventDefault();
    const room = document.getElementById("roomInner");
    const rr = room.getBoundingClientRect();
    _drag.el = el;
    _drag.didDrag = false;
    _drag.startPx = e.clientX;
    _drag.startPy = e.clientY;
    _drag.startElX = parseFloat(el.style.left) || 0;
    _drag.startElY = parseFloat(el.style.top) || 0;
    _drag.roomW = rr.width;
    _drag.roomH = rr.height;
    el.classList.add("dragging");
    el.setPointerCapture(e.pointerId);
  });

  el.addEventListener("pointermove", e => {
    if (_drag.el !== el) return;
    const dx = (e.clientX - _drag.startPx) / _drag.roomW * 100;
    const dy = (e.clientY - _drag.startPy) / _drag.roomH * 100;
    if (Math.abs(dx) > 0.3 || Math.abs(dy) > 0.3) _drag.didDrag = true;
    el.style.left = Math.max(0, Math.min(85, _drag.startElX + dx)).toFixed(1) + "%";
    el.style.top  = Math.max(0, Math.min(85, _drag.startElY + dy)).toFixed(1) + "%";
  });

  el.addEventListener("pointerup", () => {
    if (_drag.el !== el) return;
    el.classList.remove("dragging");
    if (_drag.didDrag) lagreShelves();
    _drag.el = null;
  });

  el.addEventListener("dblclick", e => {
    if (!document.body.classList.contains("admin-mode")) return;
    e.stopPropagation();
    el.dataset.orientation = (el.dataset.orientation === "v") ? "h" : "v";
    lagreShelves();
  });

  // Hover tooltip
  el.addEventListener("mouseenter", () => {
    const id = el.dataset.shelf;
    const name = el.dataset.name || id;
    const items = hylleData[id] || [];
    document.getElementById("tooltipName").textContent = "Hylle " + name;
    document.getElementById("tooltipCount").textContent = items.length + " gjenstand" + (items.length !== 1 ? "er" : "");
    document.getElementById("tooltipItems").innerHTML = items.slice(0, 8).map(g =>
      '<div>' + escHtml(g.navn) + '</div>'
    ).join("") + (items.length > 8 ? '<div style="color:var(--muted)">+ ' + (items.length - 8) + ' til...</div>' : '');
    document.getElementById("shelfTooltip").classList.add("visible");
  });
  el.addEventListener("mousemove", e => {
    const tt = document.getElementById("shelfTooltip");
    tt.style.left = (e.clientX + 14) + "px";
    tt.style.top = (e.clientY + 14) + "px";
  });
  el.addEventListener("mouseleave", () => {
    document.getElementById("shelfTooltip").classList.remove("visible");
  });
}

// Initial render from localStorage defaults (instant), then hydrate from
// the cloud in the background and re-render if anything changed.
renderShelves();
hydrateKartFromCloud();

// ── HAMBURGER / ADMIN ─────────────────────────────────────
function toggleMeny() {
  document.getElementById("hamburgerMeny").classList.toggle("open");
  document.getElementById("hamburger").classList.toggle("open");
}
document.addEventListener("click", function(e) {
  var meny = document.getElementById("hamburgerMeny");
  var btn  = document.getElementById("hamburger");
  if (meny && !meny.contains(e.target) && !btn.contains(e.target)) {
    meny.classList.remove("open");
    btn.classList.remove("open");
  }
});
// ── EDIT SESSION (snapshot + revert on exit-without-Ferdig) ──
let _editSnapshot = null;

function snapshotEdit() {
  _editSnapshot = {
    kartShelves: localStorage.getItem("kartShelves"),
    kartShapes:  localStorage.getItem("kartShapes"),
  };
}

function hasUnsavedChanges() {
  if (!_editSnapshot) return false;
  return localStorage.getItem("kartShelves") !== _editSnapshot.kartShelves
      || localStorage.getItem("kartShapes")  !== _editSnapshot.kartShapes;
}

function revertEdits() {
  if (!_editSnapshot) return;
  if (_editSnapshot.kartShelves == null) localStorage.removeItem("kartShelves");
  else localStorage.setItem("kartShelves", _editSnapshot.kartShelves);
  if (_editSnapshot.kartShapes == null) localStorage.removeItem("kartShapes");
  else localStorage.setItem("kartShapes", _editSnapshot.kartShapes);
  _editSnapshot = null;
}

function setAdminUI(on) {
  document.body.classList.toggle("admin-mode", on);
  sessionStorage.setItem("adminMode", on ? "1" : "");
  var btn = document.getElementById("adminToggle");
  if (btn) btn.classList.toggle("active", on);
}

async function toggleAdmin() {
  const isOn = document.body.classList.contains("admin-mode");
  if (!isOn) {
    // Enter edit mode → snapshot
    snapshotEdit();
    setAdminUI(true);
    return;
  }
  // Exit requested via Administrer toggle
  if (hasUnsavedChanges()) {
    const discard = await kartModal({
      title: "Ulagrede endringer",
      message: "Du har endringer som ikke er lagret. Hva vil du gjøre?",
      okLabel: "Forkast endringer",
      cancelLabel: "Fortsett å redigere",
      danger: true,
    });
    if (!discard) return; // keep editing, stay in admin mode
    revertEdits();
    setAdminUI(false);
    // close hamburger menu so user sees the reverted map
    var meny = document.getElementById("hamburgerMeny");
    var hb = document.getElementById("hamburger");
    if (meny) meny.classList.remove("open");
    if (hb) hb.classList.remove("open");
    location.reload();
    return;
  }
  // No changes → just exit
  _editSnapshot = null;
  setAdminUI(false);
}

function visToast(text) {
  var t = document.getElementById("kartToast");
  if (!t) return;
  t.textContent = text;
  t.classList.add("show");
  clearTimeout(visToast._tm);
  visToast._tm = setTimeout(function() { t.classList.remove("show"); }, 2200);
}

async function ferdigRedigere() {
  // Commit: push localStorage to the cloud so every client sees the same map.
  _editSnapshot = null;
  setAdminUI(false);
  var meny = document.getElementById("hamburgerMeny");
  var hb = document.getElementById("hamburger");
  if (meny) meny.classList.remove("open");
  if (hb) hb.classList.remove("open");
  visToast("⏳ Lagrer kartet…");
  const ok = await lagreKartConfigTilSky();
  visToast(ok ? "✓ Kartet er lagret for alle" : "⚠️ Kunne ikke lagre til skyen");
}
(function() {
  if (sessionStorage.getItem("adminMode") === "1") {
    document.body.classList.add("admin-mode");
    snapshotEdit();
    var btn = document.getElementById("adminToggle");
    if (btn) btn.classList.add("active");
  }
})();
</script>
