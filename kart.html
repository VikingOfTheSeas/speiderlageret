<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-store">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>Kart – 1. Haugerud</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/auth.js"></script>
  <style>
    /* ── KART PAGE ─────────────────────────────────────────── */
    .kart-page { max-width: 1200px; margin: 0 auto; padding: 20px; }

    .kart-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
    }
    .kart-header h2 { font-size: 18px; font-weight: 700; color: var(--primary); }

    .kart-search-wrap {
      display: flex; align-items: center; gap: 8px;
    }
    .kart-search {
      padding: 9px 12px; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(70,189,198,0.25); border-radius: var(--r);
      color: var(--text); font-size: 13px; font-family: inherit;
      width: 220px; transition: border-color .15s;
    }
    .kart-search::placeholder { color: #475569; }
    .kart-search:focus { outline: none; border-color: rgba(70,189,198,0.55); background: rgba(255,255,255,0.09); }

    /* ── ROOM CONTAINER ────────────────────────────────────── */
    .room-container {
      position: relative;
      background: #10253e;
      border: 2px solid rgba(70,189,198,0.2);
      border-radius: 16px;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      max-height: 75vh;
      margin: 0 auto;
      cursor: grab;
      user-select: none;
      touch-action: none;
    }
    .room-container:active { cursor: grabbing; }

    .room-inner {
      position: absolute;
      width: 100%; height: 100%;
      transform-origin: 0 0;
      transition: transform 0.1s ease-out;
    }

    /* Walls */
    .room-walls {
      position: absolute;
      inset: 4% 4% 4% 4%;
      border: 3px solid rgba(70,189,198,0.35);
      border-radius: 8px;
      background: rgba(70,189,198,0.03);
    }

    /* Dotted floor */
    .room-walls::before {
      content: "";
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(70,189,198,0.08) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    /* Door */
    .room-door {
      position: absolute;
      left: 73%; bottom: 0;
      width: 12%; height: 8%;
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 4px;
      font-family: "DM Mono", monospace;
      font-size: 13px; font-weight: 700; color: rgba(70,189,198,0.9);
      letter-spacing: 2px;
      border-top: 3px solid rgba(70,189,198,0.6);
      border-left: 3px solid rgba(70,189,198,0.6);
      border-right: 3px solid rgba(70,189,198,0.6);
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      background: rgba(70,189,198,0.07);
      z-index: 6;
    }
    .room-door::before {
      content: "";
      position: absolute; top: 6px; left: 6px;
      right: 6px; bottom: 0;
      border-top: 2px dashed rgba(70,189,198,0.25);
      border-radius: 4px 4px 0 0;
    }

    /* ── SHELF ─────────────────────────────────────────────── */
    .shelf {
      position: absolute;
      background: rgba(239,68,68,0.2);
      border: 2px solid rgba(239,68,68,0.5);
      border-radius: 4px;
      cursor: pointer;
      transition: background .2s, border-color .2s, box-shadow .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    /* Admin drag mode */
    body.admin-mode .shelf { cursor: grab; }
    body.admin-mode .shelf.dragging { cursor: grabbing; opacity: .85; z-index: 50; transition: none; }
    body.admin-mode .shelf::after {
      content: "✥";
      position: absolute; top: 2px; right: 3px;
      font-size: 9px; color: rgba(255,255,255,0.4);
      pointer-events: none;
    }
    .admin-kart-bar {
      display: none; align-items: center; gap: 8px;
      margin-bottom: 10px; flex-wrap: wrap;
    }
    body.admin-mode .admin-kart-bar { display: flex; }
    .btn-kart-reset {
      padding: 7px 14px; background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3); border-radius: 8px;
      color: var(--danger); font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .btn-kart-reset:hover { background: rgba(248,113,113,0.2); }
    .admin-kart-hint { font-size: 11px; color: var(--muted); }
    .shelf:hover {
      background: rgba(239,68,68,0.35);
      border-color: rgba(239,68,68,0.8);
      transform: scale(1.03);
      z-index: 20;
    }
    .shelf.highlight {
      background: rgba(70,189,198,0.35);
      border-color: var(--primary);
      box-shadow: 0 0 16px rgba(70,189,198,0.4);
      animation: shelf-pulse 1.5s ease-in-out infinite;
    }
    @keyframes shelf-pulse {
      0%, 100% { box-shadow: 0 0 16px rgba(70,189,198,0.4); }
      50% { box-shadow: 0 0 28px rgba(70,189,198,0.6); }
    }

    .shelf-label {
      font-family: 'DM Mono', monospace;
      font-size: clamp(10px, 1.5vw, 16px);
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      pointer-events: none;
    }

    /* Sofakrok */
    .sofakrok {
      position: absolute;
      background: rgba(70,189,198,0.15);
      border: 2px solid rgba(70,189,198,0.4);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }
    .sofakrok-label {
      font-size: clamp(9px, 1.2vw, 13px);
      font-weight: 600;
      color: var(--primary);
      opacity: 0.8;
      pointer-events: none;
    }

    /* ── TOOLTIP ────────────────────────────────────────────── */
    .shelf-tooltip {
      display: none;
      position: fixed;
      z-index: 1000;
      background: #0d2137;
      border: 1px solid rgba(70,189,198,0.35);
      border-radius: 10px;
      padding: 12px 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      pointer-events: none;
      min-width: 160px;
      max-width: 280px;
    }
    .shelf-tooltip.visible { display: block; }
    .shelf-tooltip-name {
      font-family: 'DM Mono', monospace;
      font-size: 16px; font-weight: 700;
      color: var(--primary); margin-bottom: 6px;
    }
    .shelf-tooltip-count {
      font-size: 12px; color: var(--muted); margin-bottom: 4px;
    }
    .shelf-tooltip-items {
      font-size: 11px; color: var(--text);
      max-height: 100px; overflow-y: auto;
      line-height: 1.6;
    }

    /* ── SHELF DETAIL PANEL ────────────────────────────────── */
    .shelf-panel {
      display: none;
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-top: 16px;
      overflow: hidden;
    }
    .shelf-panel.open { display: block; }
    .shelf-panel-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .shelf-panel-title {
      font-family: 'DM Mono', monospace;
      font-size: 18px; font-weight: 700; color: var(--primary);
    }
    .shelf-panel-close {
      width: 28px; height: 28px;
      background: rgba(255,255,255,0.07); border: none; border-radius: 6px;
      color: var(--muted); cursor: pointer; font-size: 13px;
    }
    .shelf-panel-close:hover { background: rgba(255,255,255,0.12); color: var(--text); }
    .shelf-panel-body { padding: 16px 20px; }
    .shelf-panel-empty {
      text-align: center; padding: 30px; color: var(--muted); font-size: 13px;
    }
    .shelf-item-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }
    .shelf-item-card {
      display: flex; flex-direction: column;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      overflow: hidden;
      text-decoration: none; color: inherit;
      transition: all .15s;
    }
    .shelf-item-card:hover {
      background: rgba(70,189,198,0.07);
      border-color: rgba(70,189,198,0.25);
      transform: translateY(-1px);
    }
    .shelf-item-img {
      width: 100%; height: 110px; object-fit: cover;
      background: rgba(255,255,255,0.03);
    }
    .shelf-item-img-placeholder {
      width: 100%; height: 110px;
      background: rgba(255,255,255,0.03);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; opacity: 0.3;
    }
    .shelf-item-info {
      padding: 10px 12px; display: flex; flex-direction: column; gap: 5px;
    }
    .shelf-item-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .shelf-item-meta { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 4px; }
    .shelf-item-id { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--primary); }
    .shelf-item-hylle { font-size: 10px; color: var(--muted); }
    .shelf-item-kat { font-size: 10px; color: var(--muted); }

    /* ── ZOOM CONTROLS ─────────────────────────────────────── */
    .zoom-controls {
      position: absolute; top: 12px; right: 12px;
      display: flex; gap: 4px; z-index: 50;
    }
    .zoom-btn {
      width: 36px; height: 36px;
      background: rgba(10,22,40,0.9); border: 1px solid rgba(70,189,198,0.3);
      border-radius: 8px; color: var(--primary);
      font-size: 18px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .zoom-btn:hover { background: rgba(70,189,198,0.15); }

    /* ── LEGEND ─────────────────────────────────────────────── */
    .kart-legend {
      display: flex; gap: 16px; flex-wrap: wrap;
      margin-top: 12px; font-size: 11px; color: var(--muted);
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-swatch {
      width: 14px; height: 14px; border-radius: 3px;
    }

    /* ── RESPONSIVE ─────────────────────────────────────────── */
    @media (max-width: 768px) {
      .kart-page { padding: 12px; }
      .room-container { aspect-ratio: 3 / 4; max-height: 65vh; }
      .kart-search { width: 160px; }
      .shelf-label { font-size: 10px; }
      .tabs { display: none; }
    }
  </style>
</head>

      <div class="shelf" data-shelf="D" style="top:80%;left:32%;width:14%;height:7%;" onclick="velgHylle('D')">
        <span class="shelf-label">D</span>
      </div>
      <div class="shelf" data-shelf="C" style="top:80%;left:50%;width:14%;height:7%;" onclick="velgHylle('C')">
        <span class="shelf-label">C</span>
      </div>
    </div>

    <!-- Zoom controls -->
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="zoom(1)">+</button>
      <button class="zoom-btn" onclick="resetZoom()" style="font-size:12px;">&#8634;</button>
    </div>
  </div>

  <!-- Legend -->
  <div class="kart-legend">
    <div class="legend-item">
      <div class="legend-swatch" style="background:rgba(239,68,68,0.3);border:2px solid rgba(239,68,68,0.6);"></div>
      Hylle
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:rgba(70,189,198,0.3);border:2px solid rgba(70,189,198,0.6);"></div>
      Sofakrok
    </div>
  </div>

  <!-- Shelf tooltip (follows mouse) -->
  <div class="shelf-tooltip" id="shelfTooltip">
    <div class="shelf-tooltip-name" id="tooltipName"></div>
    <div class="shelf-tooltip-count" id="tooltipCount"></div>
    <div class="shelf-tooltip-items" id="tooltipItems"></div>
  </div>

  <!-- Shelf detail panel -->
  <div class="shelf-panel" id="shelfPanel">
    <div class="shelf-panel-header">
      <span class="shelf-panel-title" id="panelTitle">Hylle</span>
      <button class="shelf-panel-close" onclick="lukkPanel()">X</button>
    </div>
    <div class="shelf-panel-body" id="panelBody"></div>
  </div>
</main>

<div id="banner" class="banner" style="display:none"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin="anonymous"></script>
<script src="js/config.js"></script>
<script>
// ── DATA ──────────────────────────────────────────────────
let gjenstander = [];
let hylleData = {}; // { "A": [item, item, ...], "B": [...] }
let valgtHylle = null;

document.addEventListener("DOMContentLoaded", async () => {
  const { data, error } = await db.from("gjenstander").select("*");
  if (error) { console.error(error); return; }
  gjenstander = data || [];
  byggHylleData();
  oppdaterHylleTellere();

  // Highlight shelf from URL param
  const params = new URLSearchParams(location.search);
  const h = params.get("hylle");
  if (h) {
    highlightHylle(h.toUpperCase());
    velgHylle(h.toUpperCase());
  }

  // Realtime updates
  db.channel("kart-gjenstander")
    .on("postgres_changes", { event: "*", schema: "public", table: "gjenstander" },
      () => lastInnData())
    .subscribe();
});

async function lastInnData() {
  const { data } = await db.from("gjenstander").select("*");
  gjenstander = data || [];
  byggHylleData();
  oppdaterHylleTellere();
  if (valgtHylle) visPanel(valgtHylle);
}

function byggHylleData() {
  hylleData = {};
  gjenstander.forEach(g => {
    const h = extractHylle(g.hylleplassering);
    if (!h) return;
    if (!hylleData[h]) hylleData[h] = [];
    hylleData[h].push(g);
  });
}

function extractHylle(plassering) {
  if (!plassering) return null;
  // Extract letter prefix: "A10" → "A", "Sofakrok" → "Sofakrok"
  const m = plassering.match(/^([A-N])/i);
  return m ? m[1].toUpperCase() : null;
}

function oppdaterHylleTellere() {
  document.querySelectorAll(".shelf").forEach(el => {
    const id = el.dataset.shelf;
    const items = hylleData[id] || [];
    const label = el.querySelector(".shelf-label");
    label.textContent = id + (items.length ? " (" + items.length + ")" : "");
  });
}

// ── SHELF CLICK → PANEL ──────────────────────────────────
function velgHylle(id) {
  valgtHylle = id;
  // Highlight
  document.querySelectorAll(".shelf").forEach(el => el.classList.remove("highlight"));
  const el = document.querySelector('.shelf[data-shelf="' + id + '"]');
  if (el) el.classList.add("highlight");
  visPanel(id);
}

function visPanel(id) {
  const panel = document.getElementById("shelfPanel");
  const body = document.getElementById("panelBody");
  const items = hylleData[id] || [];
  const antall = items.length;
  document.getElementById("panelTitle").textContent = "Hylle " + id + (antall ? " · " + antall + " gjenstand" + (antall !== 1 ? "er" : "") : "");

  if (antall === 0) {
    body.innerHTML = '<div class="shelf-panel-empty">Ingen gjenstander på denne hyllen</div>';
  } else {
    const statusKlasse = s => ({ "Tilgjengelig":"status-tilgjengelig","Utlånt":"status-utlant","Til reparasjon":"status-reparasjon","Tapt":"status-tapt" }[s] || "status-tilgjengelig");
    const statusTekst  = s => ({ "Tilgjengelig":"Tilgjengelig","Utlånt":"Utlånt","Til reparasjon":"Reparasjon","Tapt":"Tapt" }[s] || s);
    body.innerHTML = '<div class="shelf-item-grid">' + items.map(g => {
      const img = g.bilde_url
        ? '<img class="shelf-item-img" src="' + escHtml(g.bilde_url) + '" alt="" loading="lazy" onerror="this.outerHTML=\'<div class=shelf-item-img-placeholder>📦</div>\'">'
        : '<div class="shelf-item-img-placeholder">📦</div>';
      return '<a href="item.html?id=' + encodeURIComponent(g.id) + '" class="shelf-item-card">' +
        img +
        '<div class="shelf-item-info">' +
          '<div class="shelf-item-name">' + escHtml(g.navn) + '</div>' +
          '<div class="shelf-item-meta">' +
            '<span class="shelf-item-id">' + escHtml(g.id) + '</span>' +
            '<span class="status-badge ' + statusKlasse(g.status) + '">' + statusTekst(g.status) + '</span>' +
          '</div>' +
          (g.kategori ? '<div class="shelf-item-kat">' + escHtml(g.kategori) + '</div>' : '') +
          '<div class="shelf-item-hylle">📍 ' + escHtml(g.hylleplassering || id) + '</div>' +
        '</div>' +
      '</a>';
    }).join("") + '</div>';
  }
  panel.classList.add("open");
  panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

function lukkPanel() {
  document.getElementById("shelfPanel").classList.remove("open");
  document.querySelectorAll(".shelf").forEach(el => el.classList.remove("highlight"));
  valgtHylle = null;
}

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s || "";
  return d.innerHTML;
}

// ── HOVER TOOLTIP ─────────────────────────────────────────
document.querySelectorAll(".shelf").forEach(el => {
  el.addEventListener("mouseenter", e => {
    const id = el.dataset.shelf;
    const items = hylleData[id] || [];
    document.getElementById("tooltipName").textContent = "Hylle " + id;
    document.getElementById("tooltipCount").textContent = items.length + " gjenstand" + (items.length !== 1 ? "er" : "");
    document.getElementById("tooltipItems").innerHTML = items.slice(0, 8).map(g =>
      '<div>' + escHtml(g.navn) + '</div>'
    ).join("") + (items.length > 8 ? '<div style="color:var(--muted)">+ ' + (items.length - 8) + ' til...</div>' : '');
    document.getElementById("shelfTooltip").classList.add("visible");
  });
  el.addEventListener("mousemove", e => {
    const tt = document.getElementById("shelfTooltip");
    tt.style.left = (e.clientX + 14) + "px";
    tt.style.top = (e.clientY + 14) + "px";
  });
  el.addEventListener("mouseleave", () => {
    document.getElementById("shelfTooltip").classList.remove("visible");
  });
});

// ── SEARCH ────────────────────────────────────────────────
function sokKart(q) {
  q = q.trim().toLowerCase();
  document.querySelectorAll(".shelf").forEach(el => el.classList.remove("highlight"));
  if (!q) { lukkPanel(); return; }

  // Match shelf letter
  const exactShelf = q.match(/^([a-n])$/i);
  if (exactShelf) {
    highlightHylle(exactShelf[1].toUpperCase());
    velgHylle(exactShelf[1].toUpperCase());
    return;
  }

  // Match item name → find shelf
  const found = new Set();
  gjenstander.forEach(g => {
    if ((g.navn || "").toLowerCase().includes(q) ||
        (g.id || "").toLowerCase().includes(q) ||
        (g.hylleplassering || "").toLowerCase().includes(q)) {
      const h = extractHylle(g.hylleplassering);
      if (h) found.add(h);
    }
  });
  found.forEach(h => highlightHylle(h));
  if (found.size === 1) velgHylle([...found][0]);
}

function highlightHylle(id) {
  const el = document.querySelector('.shelf[data-shelf="' + id + '"]');
  if (el) el.classList.add("highlight");
}

// ── ZOOM & PAN ────────────────────────────────────────────
let currentZoom = 1;
let panX = 0, panY = 0;
let isDragging = false;
let dragStartX, dragStartY;

function clampPan() {
  const cr = container.getBoundingClientRect();
  const inner = document.getElementById("roomInner");
  const maxX = Math.max(0, (inner.offsetWidth  * currentZoom - cr.width)  / 2);
  const maxY = Math.max(0, (inner.offsetHeight * currentZoom - cr.height) / 2);
  panX = Math.max(-maxX, Math.min(maxX, panX));
  panY = Math.max(-maxY, Math.min(maxY, panY));
}

function zoom(dir) {
  currentZoom = Math.max(1, Math.min(3, currentZoom + dir * 0.3));
  clampPan();
  applyTransform();
}

function resetZoom() {
  currentZoom = 1; panX = 0; panY = 0;
  applyTransform();
}

function applyTransform() {
  document.getElementById("roomInner").style.transform =
    'translate(' + panX + 'px, ' + panY + 'px) scale(' + currentZoom + ')';
}

const container = document.getElementById("roomContainer");
container.addEventListener("pointerdown", e => {
  if (e.target.closest(".shelf, .zoom-btn, .sofakrok")) return;
  isDragging = true;
  dragStartX = e.clientX - panX;
  dragStartY = e.clientY - panY;
  container.setPointerCapture(e.pointerId);
});
container.addEventListener("pointermove", e => {
  if (!isDragging) return;
  panX = e.clientX - dragStartX;
  panY = e.clientY - dragStartY;
  clampPan();
  document.getElementById("roomInner").style.transition = "none";
  applyTransform();
});
container.addEventListener("pointerup", () => {
  isDragging = false;
  document.getElementById("roomInner").style.transition = "transform 0.1s ease-out";
});
container.addEventListener("wheel", e => {
  e.preventDefault();
  zoom(e.deltaY < 0 ? 1 : -1);
}, { passive: false });

// ── ADMIN DRAG EDITING ────────────────────────────────────
const LS_KEY = "kartHyllePosisjoner";

function lastHyllePosisjoner() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { return {}; }
}

function lagreHyllePosisjoner() {
  const pos = {};
  document.querySelectorAll(".shelf").forEach(el => {
    pos[el.dataset.shelf] = { top: el.style.top, left: el.style.left, width: el.style.width, height: el.style.height };
  });
  localStorage.setItem(LS_KEY, JSON.stringify(pos));
}

function tilbakestillHyller() {
  localStorage.removeItem(LS_KEY);
  location.reload();
}

function brukLagredePosisjoner() {
  const pos = lastHyllePosisjoner();
  document.querySelectorAll(".shelf").forEach(el => {
    const p = pos[el.dataset.shelf];
    if (!p) return;
    el.style.top    = p.top;
    el.style.left   = p.left;
    el.style.width  = p.width;
    el.style.height = p.height;
  });
}
brukLagredePosisjoner();

// Drag-to-move shelves in admin mode
(function () {
  let dragEl = null, startPx, startPy, startElX, startElY, roomW, roomH, didDrag;

  document.querySelectorAll(".shelf").forEach(el => {
    el.addEventListener("pointerdown", e => {
      if (!document.body.classList.contains("admin-mode")) return;
      e.stopPropagation();
      e.preventDefault();
      const room = document.getElementById("roomInner");
      const rr   = room.getBoundingClientRect();
      dragEl    = el;
      didDrag   = false;
      startPx   = e.clientX;
      startPy   = e.clientY;
      startElX  = parseFloat(el.style.left) || 0;
      startElY  = parseFloat(el.style.top)  || 0;
      // rr.width is the rendered (scaled) width; divide by zoom to get natural room width in screen pixels
      // so that dx_screen / roomW_screen gives correct % in natural coordinates
      roomW = rr.width;
      roomH = rr.height;
      dragEl.classList.add("dragging");
      dragEl.setPointerCapture(e.pointerId);
    });

    el.addEventListener("pointermove", e => {
      if (!dragEl || dragEl !== el) return;
      const dx = (e.clientX - startPx) / roomW * 100;
      const dy = (e.clientY - startPy) / roomH * 100;
      if (Math.abs(dx) > 0.3 || Math.abs(dy) > 0.3) didDrag = true;
      const elW = parseFloat(dragEl.style.width)  || 10;
      const elH = parseFloat(dragEl.style.height) || 8;
      dragEl.style.left = Math.max(0, Math.min(100 - elW, startElX + dx)).toFixed(1) + "%";
      dragEl.style.top  = Math.max(0, Math.min(100 - elH, startElY + dy)).toFixed(1) + "%";
    });

    el.addEventListener("pointerup", () => {
      if (!dragEl || dragEl !== el) return;
      dragEl.classList.remove("dragging");
      if (didDrag) lagreHyllePosisjoner();
      dragEl = null;
    });

    el.addEventListener("click", e => {
      if (didDrag) { e.stopImmediatePropagation(); didDrag = false; }
    }, true);
  });
})();

// ── HAMBURGER / ADMIN ─────────────────────────────────────
function toggleMeny() {
  document.getElementById("hamburgerMeny").classList.toggle("open");
  document.getElementById("hamburger").classList.toggle("open");
}
document.addEventListener("click", function(e) {
  var meny = document.getElementById("hamburgerMeny");
  var btn  = document.getElementById("hamburger");
  if (meny && !meny.contains(e.target) && !btn.contains(e.target)) {
    meny.classList.remove("open");
    btn.classList.remove("open");
  }
});
function toggleAdmin() {
  var active = document.body.classList.toggle("admin-mode");
  sessionStorage.setItem("adminMode", active ? "1" : "");
  var btn = document.getElementById("adminToggle");
  if (btn) btn.classList.toggle("active", active);
}
(function() {
  if (sessionStorage.getItem("adminMode") === "1") {
    document.body.classList.add("admin-mode");
    var btn = document.getElementById("adminToggle");
    if (btn) btn.classList.add("active");
  }
})();
</script>
</body>
</html>
